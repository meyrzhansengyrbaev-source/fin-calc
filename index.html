<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinCalc Pro — Full Localization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0033; --card: #2d0050; --accent: #ffcc00;
            --accent-gradient: linear-gradient(135deg, #ffcc00, #ff9900);
            --text: #ffffff; --dim: #b388ff; --danger: #ff4d4d; --real: #00f2ff;
        }
        body.light {
            --bg: #f3e5f5; --card: #ffffff; --text: #2d0050;
            --dim: #6a1b9a; --accent: #6200ea;
            --accent-gradient: linear-gradient(135deg, #6200ea, #b388ff); --real: #00c2cb;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Manrope', sans-serif; margin: 0; padding: 15px; background: var(--bg); color: var(--text); transition: 0.4s; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-switch { display: flex; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; }
        .lang-btn { border: none; background: none; color: var(--dim); padding: 8px 16px; cursor: pointer; border-radius: 10px; font-weight: 800; font-size: 12px; }
        .lang-btn.active { background: var(--accent-gradient); color: #000; box-shadow: 0 4px 10px rgba(255,204,0,0.3); }

        h1 { margin: 10px 0; font-weight: 800; font-size: 28px; letter-spacing: -1px; }
        .gold-text { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .card { 
            background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
        }

        .inf-panel {
            background: rgba(255, 204, 0, 0.08); border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 22px; padding: 18px; margin-bottom: 20px;
        }
        .inf-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-gradient); }
        input:checked + .slider:before { transform: translateX(21px); background-color: #000; }

        label { display: block; font-size: 11px; color: var(--dim); margin: 0 0 8px 8px; text-transform: uppercase; font-weight: 700; }
        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); 
            font-size: 16px; background: rgba(0,0,0,0.2); color: #fff; outline: none; margin-bottom: 15px;
        }
        body.light input, body.light select { color: #000; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); }

        .res-box { margin: 20px 0; padding: 20px; border-radius: 22px; background: rgba(255, 204, 0, 0.05); border: 1px dashed var(--accent); text-align: center; }
        .big-val { font-size: 26px; font-weight: 800; color: var(--accent); display: block; }

        .table-wrap { overflow-y: auto; border-radius: 20px; background: rgba(0,0,0,0.15); max-height: 280px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 15px; text-align: left; color: var(--accent); position: sticky; top: 0; background: #3a0066; z-index: 10; border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .chart-wrap { height: 260px; margin-bottom: 25px; }
        .theme-toggle { font-size: 24px; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<div class="header">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('kz')" id="btn-kz">KZ</button>
        <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</button>
    </div>
</div>

<h1>FinCalc <span class="gold-text">Pro</span></h1>

<div class="chart-wrap"><canvas id="mainChart"></canvas></div>

<div class="inf-panel">
    <div class="inf-row">
        <span id="t-inf-title" style="font-weight: 800; font-size: 11px; letter-spacing: 1px;">ИНФЛЯЦИЯ</span>
        <label class="switch">
            <input type="checkbox" id="inf_active" onchange="calculate()">
            <span class="slider"></span>
        </label>
    </div>
    <div id="inf_settings" style="display: none;">
        <label id="t-inf-rate" style="margin:0">Инфляция (% год)</label>
        <input id="inf_rate" type="number" value="10" oninput="calculate()">
    </div>
</div>

<div class="card">
    <h3 id="t-dep-h">💎 Депозит</h3>
    <label id="t-dep-p">Сумма</label>
    <input id="p_cap" type="text" placeholder="1 000 000" oninput="handleInput(this)">
    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;"><label id="t-dep-r">Ставка (%)</label><input id="r_cap" type="number" value="14.5" oninput="calculate()"></div>
        <div style="flex: 1;"><label id="t-dep-t">Срок (лет)</label><input id="t_cap" type="number" value="5" oninput="calculate()"></div>
    </div>
    <div id="res_cap" class="res-box"></div>
    <div class="table-wrap"><table id="depoTable"></table></div>
</div>

<div class="card">
    <h3 id="t-loan-h">💳 Кредит</h3>
    <label id="t-loan-s">Сумма кредита</label>
    <input id="s_loan" type="text" placeholder="500 000" oninput="handleInput(this)">
    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;"><label id="t-loan-r">Ставка (%)</label><input id="r_loan" type="number" value="18" oninput="calculate()"></div>
        <div style="flex: 1;"><label id="t-loan-n">Срок (мес)</label><input id="n_loan" type="number" value="12" oninput="calculate()"></div>
    </div>
    <select id="type_loan" onchange="calculate()">
        <option value="annuity" id="opt-ann">Аннуитетный</option>
        <option value="diff" id="opt-diff">Дифференцированный</option>
    </select>
    <div id="res_loan" class="res-box"></div>
    <div class="table-wrap"><table id="loanTable"></table></div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let chart, lang = 'ru';
    
    const lex = {
        kz: {
            infTitle: "📉 ИНФЛЯЦИЯНЫ ЕСКЕРУ",
            infRate: "Күтілетін инфляция (% жылына)",
            depH: "💎 Депозит (күрделі пайыз)",
            depP: "Бастапқы сома",
            depR: "Мөлшерлеме (%)",
            depT: "Мерзімі (жыл)",
            loanH: "💳 Кредит",
            loanS: "Кредит сомасы",
            loanR: "Мөлшерлеме (%)",
            loanN: "Мерзімі (ай)",
            optAnn: "Аннуитеттік",
            optDiff: "Дифференциалды",
            profit: "Пайда",
            total: "Баланс",
            month: "Ай",
            real: "Реалды құны (бүгінгі ақшамен)",
            nom: "Номиналды",
            pay: "Төлем",
            rem: "Қалдық",
            over: "Артық төлем",
            perMonth: "/ай"
        },
        ru: {
            infTitle: "📉 УЧЕТ ИНФЛЯЦИИ",
            infRate: "Ожидаемая инфляция (% в год)",
            depH: "💎 Депозит (капитализация)",
            depP: "Начальная сумма",
            depR: "Ставка (%)",
            depT: "Срок (лет)",
            loanH: "💳 Кредит",
            loanS: "Сумма кредита",
            loanR: "Ставка (%)",
            loanN: "Срок (мес)",
            optAnn: "Аннуитетный",
            optDiff: "Дифференцированный",
            profit: "Прибыль",
            total: "Баланс",
            month: "Мес",
            real: "Реальная стоимость (в сегодняших ценах)",
            nom: "Номинал",
            pay: "Платеж",
            rem: "Остаток",
            over: "Переплата",
            perMonth: "/мес"
        }
    };

    const fmt = v => Math.floor(v).toLocaleString('ru-RU') + " ₸";
    
    function handleInput(el) {
        let val = el.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
        if (val) el.value = Number(val).toLocaleString('ru-RU');
        calculate();
    }

    function calculate() {
        const t = lex[lang];
        
        // Обновление статических текстов
        $('t-inf-title').innerText = t.infTitle;
        $('t-inf-rate').innerText = t.infRate;
        $('t-dep-h').innerText = t.depH;
        $('t-dep-p').innerText = t.depP;
        $('t-dep-r').innerText = t.depR;
        $('t-dep-t').innerText = t.depT;
        $('t-loan-h').innerText = t.loanH;
        $('t-loan-s').innerText = t.loanS;
        $('t-loan-r').innerText = t.loanR;
        $('t-loan-n').innerText = t.loanN;
        $('opt-ann').innerText = t.optAnn;
        $('opt-diff').innerText = t.optDiff;

        const infActive = $('inf_active').checked;
        const infRate = +$('inf_rate').value / 100;
        $('inf_settings').style.display = infActive ? 'block' : 'none';

        // ДЕПОЗИТ
        const p1 = Number($('p_cap').value.replace(/\s+/g, '')) || 0;
        const r1 = +$('r_cap').value/100/12, years = +$('t_cap').value;

        if(p1 > 0 && r1 > 0 && years > 0) {
            let cur = p1, nomPoints = [p1], realPoints = [p1];
            let table = `<tr><th>${t.month}</th><th>+ ${t.profit}</th><th>${t.total}</th></tr>`;
            for(let i=1; i<=years*12; i++) {
                let inter = cur * r1; cur += inter;
                let realVal = cur / Math.pow(1 + infRate, i/12);
                if(i % 12 === 0) { nomPoints.push(cur); realPoints.push(realVal); }
                table += `<tr><td>${i}</td><td>+${fmt(inter)}</td><td>${fmt(infActive ? realVal : cur)}</td></tr>`;
            }
            $('res_cap').innerHTML = `<span class="big-val">${fmt(infActive ? realPoints[realPoints.length-1] : cur)}</span><span style="color:var(--dim); font-size:11px;">${infActive ? t.real : t.profit + ': ' + fmt(cur-p1)}</span>`;
            $('depoTable').innerHTML = table;
            renderChart(nomPoints, infActive ? realPoints : null);
        }

        // КРЕДИТ
        const s = Number($('s_loan').value.replace(/\s+/g, '')) || 0;
        const r_l = +$('r_loan').value/100/12, n = +$('n_loan').value;
        if(s > 0 && r_l > 0 && n > 0) {
            let curS = s, tot = 0, type = $('type_loan').value;
            let table = `<tr><th>${t.month}</th><th>${t.pay}</th><th>${t.rem}</th></tr>`;
            const annPay = s * (r_l * Math.pow(1 + r_l, n)) / (Math.pow(1 + r_l, n) - 1);
            for(let i=1; i<=n; i++) {
                let p = (type === 'annuity') ? annPay : (s/n) + (curS * r_l);
                tot += p;
                let interest = curS * r_l;
                curS -= (type === 'annuity') ? (p - interest) : (s/n);
                table += `<tr><td>${i}</td><td>${fmt(p)}</td><td>${fmt(Math.max(0, curS))}</td></tr>`;
            }
            $('res_loan').innerHTML = `<span class="big-val">${fmt(tot/n)}${t.perMonth}</span><span style="color:var(--danger); font-size:12px;">${t.over}: ${fmt(tot-s)}</span>`;
            $('loanTable').innerHTML = table;
        }
    }

    function renderChart(nomData, realData) {
        if (chart) chart.destroy();
        const datasets = [{
            label: lex[lang].nom, data: nomData, borderColor: '#ffcc00', backgroundColor: 'rgba(255, 204, 0, 0.1)', fill: true, tension: 0.4
        }];
        if (realData) {
            datasets.push({
                label: lex[lang].real_label || lex[lang].real, data: realData, borderColor: '#00f2ff', borderDash: [5, 5], backgroundColor: 'rgba(0, 242, 255, 0.05)', fill: true, tension: 0.4
            });
        }
        chart = new Chart($('mainChart'), {
            type: 'line',
            data: { labels: nomData.map((_, i) => i + (lang === 'kz' ? ' ж.' : ' г.')), datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, labels: { color: '#b388ff', font: { size: 10 } } } },
                scales: { x: { ticks: { color: '#b388ff' } }, y: { display: false } }
            }
        });
    }

    function setLang(l) { 
        lang = l; 
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l));
        calculate(); 
    }
    function toggleTheme() { document.body.classList.toggle('light'); }
    window.onload = () => { setLang('ru'); calculate(); };
</script>
</body>
</html>
